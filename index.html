<script>
const DATA=[{"n": 1, "t": "A · Grundlagen Luft & Behaglichkeit", "q": "Aus welchen Bestandteilen setzt sich unsere Luft zusammen?", "a": "~78 % N₂, 21 % O₂, 1 % Argon/CO₂; immer Wasserdampf."}, {"n": 2, "t": "A · Grundlagen Luft & Behaglichkeit", "q": "Erkläre mir, was man unter der relativen Feuchte versteht.", "a": "Verhältnis Wasserdampf-Partialdruck zu Sättigungsdruck, in %."}, {"n": 3, "t": "A · Grundlagen Luft & Behaglichkeit", "q": "Was versteht man unter dem Taupunkt, und welche Bedeutung hat er in der Lüftungstechnik?", "a": "Temperatur, bei der Luft gesättigt ist (φ=100 %); darunter Kondensat."}, {"n": 4, "t": "A · Grundlagen Luft & Behaglichkeit", "q": "Worin liegt der Unterschied zwischen absoluter und relativer Feuchte?", "a": "absolut = g Wasser/kg Luft (x); relativ = Auslastung in %."}, {"n": 5, "t": "A · Grundlagen Luft & Behaglichkeit", "q": "Welche Faktoren beeinflussen die thermische Behaglichkeit eines Menschen im Raum?", "a": "Lufttemperatur, Strahlung, Luftgeschwindigkeit, Feuchte, Bekleidung, Aktivität."}, {"n": 6, "t": "A · Grundlagen Luft & Behaglichkeit", "q": "In welchem Temperatur- und Feuchtebereich fühlt sich der Mensch im Aufenthaltsraum wohl?", "a": "~20–24 °C, 30–65 % rF ."}, {"n": 7, "t": "A · Grundlagen Luft & Behaglichkeit", "q": "Was ist Zugluft, und ab wann wird Luftbewegung als unangenehm empfunden?", "a": "unbehagliche lokale Luftbewegung; Risiko bei v > ~0,2 m/s und kühl."}, {"n": 8, "t": "A · Grundlagen Luft & Behaglichkeit", "q": "Weshalb wird CO₂ als Mass für die Luftqualität verwendet, und welche Werte sind relevant?", "a": "Indikator Belegung; aussen ~400 ppm, Aufenthalt-Grenze ~1000– 1400 ppm."}, {"n": 9, "t": "A · Grundlagen Luft & Behaglichkeit", "q": "Was versteht man unter der operativen Temperatur, und warum ist sie für den Komfort massgebend?", "a": "Mittel aus Luft- und Strahlungstemperatur, massgebend für Komfort."}, {"n": 10, "t": "A · Grundlagen Luft & Behaglichkeit", "q": "Weshalb braucht es in modernen Gebäuden überhaupt eine mechanische Lüftung?", "a": "dichte Gebäude, Lasten/Feuchte/Schadstoffe abführen, Komfort, Energie, Norm."}, {"n": 11, "t": "B · Luftmengen & Bedarfsermittlung", "q": "Wie gehst du vor, um die erforderliche Aussenluftmenge für einen Raum zu bestimmen?", "a": "personen-/flächenbezogen nach SIA 2024 je Nutzung; ggf. CO₂."}, {"n": 12, "t": "B · Luftmengen & Bedarfsermittlung", "q": "In welcher Norm findest du die Raumnutzungsdaten, und was steht dort drin?", "a": "SIA 2024."}, {"n": 13, "t": "B · Luftmengen & Bedarfsermittlung", "q": "Welche Norm regelt die mechanische Lüftung in Gebäuden allgemein?", "a": "SIA 382/1."}, {"n": 14, "t": "B · Luftmengen & Bedarfsermittlung", "q": "Was sagt die Luftwechselzahl aus, und wie berechnest du sie?", "a": "n = V̇/ V_Raum (1/h)."}, {"n": 15, "t": "B · Luftmengen & Bedarfsermittlung", "q": "Wann legst du die Luftmenge personenbezogen aus und wann flächenbezogen?", "a": "Personen bei bekannter Belegung; Fläche als Mindestwert/Bauschadstoffe."}, {"n": 16, "t": "B · Luftmengen & Bedarfsermittlung", "q": "Auf welcher Grundlage bestimmst du die Luftmenge einer gewerblichen Küche?", "a": "SWKI VA102-01, Erfassung über Hauben."}, {"n": 17, "t": "B · Luftmengen & Bedarfsermittlung", "q": "Wie stellst du die Zuluft-/Abluft-Bilanz einer Anlage auf, und worauf achtest du dabei?", "a": "Raumbilanz; Über-/Unterdruck gezielt (Küche/Nass im Unterdruck)."}, {"n": 18, "t": "B · Luftmengen & Bedarfsermittlung", "q": "Wozu hält man Räume gezielt im Über- oder Unterdruck? Nenne Beispiele.", "a": "Strömungsrichtung steuern, Geruch/Feuchte/Keime gerichtet abführen."}, {"n": 19, "t": "B · Luftmengen & Bedarfsermittlung", "q": "Welchen Richtwert für die Mindestaussenluftmenge pro Person kennst du?", "a": "~25–36 m³/h, nutzungsabhängig (SIA 2024)."}, {"n": 20, "t": "B · Luftmengen & Bedarfsermittlung", "q": "Wie gehst du planerisch mit kurzzeitigen Belegungsspitzen um?", "a": "Bedarfslüftung (CO₂/Präsenz), Auslegung auf massgebenden Fall."}, {"n": 21, "t": "C · h,x-(Mollier-)Diagramm", "q": "Was kannst du alles aus dem h,x-Diagramm herauslesen?", "a": "Zustände feuchter Luft: ϑ, x, φ, h."}, {"n": 22, "t": "C · h,x-(Mollier-)Diagramm", "q": "Wie verläuft die Luft-Erwärmung im h,x-Diagramm, und was passiert dabei mit der relativen Feuchte?", "a": "x konstant, ϑ↑, φ↓ (senkrecht nach oben)."}, {"n": 23, "t": "C · h,x-(Mollier-)Diagramm", "q": "Wie stellt sich das Kühlen ohne Entfeuchtung im h,x-Diagramm dar?", "a": "x konstant bis Taupunkt."}, {"n": 24, "t": "C · h,x-(Mollier-)Diagramm", "q": "Was passiert beim Kühlen mit Entfeuchtung, und wie zeichnest du diesen Prozess ins h,x-Diagramm?", "a": "unter Taupunkt: x↓, Kondensat fällt aus."}, {"n": 25, "t": "C · h,x-(Mollier-)Diagramm", "q": "Wie verläuft die Dampfbefeuchtung im h,x-Diagramm?", "a": "ϑ ≈ konstant, x↑."}, {"n": 26, "t": "C · h,x-(Mollier-)Diagramm", "q": "Wie verläuft die adiabate Befeuchtung im h,x-Diagramm, und was passiert mit der Temperatur?", "a": "h ≈ konstant, ϑ↓, x↑."}, {"n": 27, "t": "C · h,x-(Mollier-)Diagramm", "q": "Wie konstruierst du die Mischung zweier Luftströme im h,x-Diagramm?", "a": "Zustand auf Verbindungslinie, gewichtet nach Massenanteil."}, {"n": 28, "t": "C · h,x-(Mollier-)Diagramm", "q": "Was beschreibt die Enthalpie h, und wofür brauchst du sie?", "a": "Energiegehalt; Leistung Q ̇= ṁ·Δh."}, {"n": 29, "t": "C · h,x-(Mollier-)Diagramm", "q": "Was bedeutet die Sättigungslinie im h,x-Diagramm?", "a": "φ = 100 %, Begrenzung links/oben."}, {"n": 30, "t": "C · h,x-(Mollier-)Diagramm", "q": "In welchen Fällen ist ein Tropfenabscheider erforderlich?", "a": "bei Entfeuchtung/Kühlung unter Taupunkt."}, {"n": 31, "t": "D · Strömung & Druckverlust", "q": "Erkläre das Kontinuitätsgesetz und seine Anwendung in der Lüftung.", "a": "V̇= A·v; kleinerer Querschnitt = höhere Geschwindigkeit."}, {"n": 32, "t": "D · Strömung & Druckverlust", "q": "Welche Druckarten unterscheidet man im Lüftungskanal, und wie hängen sie zusammen?", "a": "statisch, dynamisch (p_dyn=ρ/2·v²), total."}, {"n": 33, "t": "D · Strömung & Druckverlust", "q": "Von welchen Grössen hängt der Reibungsdruckverlust eines Kanals ab?", "a": "λ, l/d, ρ, v² (Δp=λ·l/d·ρ/2·v²)."}, {"n": 34, "t": "D · Strömung & Druckverlust", "q": "Was ist ein Einzelwiderstand, und wie berechnest du dessen Druckverlust?", "a": "Δp=ζ·ρ/2·v² (Bögen, Abzweige, Übergänge)."}, {"n": 35, "t": "D · Strömung & Druckverlust", "q": "Woher nimmst du die Zeta-Werte für deine Druckverlustberechnung?", "a": "aus Tabellen je Formstück."}, {"n": 36, "t": "D · Strömung & Druckverlust", "q": "Wie bestimmst du den hydraulischen Durchmesser eines Rechteckkanals, und wozu brauchst du ihn?", "a": "d_h = 2ab/(a+b)."}, {"n": 37, "t": "D · Strömung & Druckverlust", "q": "Weshalb soll die Luftgeschwindigkeit im Kanalnetz nicht zu hoch gewählt werden?", "a": "Druckverlust↑, Schall↑, Energie↑."}, {"n": 38, "t": "D · Strömung & Druckverlust", "q": "Welche Richtwerte für Luftgeschwindigkeiten in Kanälen kennst du?", "a": "Hauptkanal 4–6, Neben 2–4, Auslass 1–3 m/s. 1"}, {"n": 39, "t": "D · Strömung & Druckverlust", "q": "Was ist der massgebende Strang, und welche Rolle spielt er bei der Ventilatorauswahl?", "a": "ungünstigste Strecke mit grösstem Δp → bestimmt Pressung."}, {"n": 40, "t": "D · Strömung & Druckverlust", "q": "Wie wird eine Anlage einreguliert, und mit welchen Mitteln?", "a": "Volumenstromregler/Drosselklappen, Messung, Protokoll."}, {"n": 41, "t": "E · Ventilatoren", "q": "Welche Ventilator-Bauarten kennst du, und wo setzt man sie ein?", "a": "Radial (hoher Druck), Axial (grosse Mengen, wenig Druck)."}, {"n": 42, "t": "E · Ventilatoren", "q": "Mit welcher Formel berechnest du die Leistungsaufnahme eines Ventilators?", "a": "P = V̇·Δp_t/η."}, {"n": 43, "t": "E · Ventilatoren", "q": "Was ist die spezifische Ventilatorleistung SFP, und weshalb ist sie wichtig?", "a": "spezifische Ventilatorleistung P_el/V̇, Energiekennzahl (SIA 382/1)."}, {"n": 44, "t": "E · Ventilatoren", "q": "Erkläre die Ventilatorgesetze: Was passiert bei einer Drehzahländerung?", "a": "V̇∝n, Δp∝n², P∝n³."}, {"n": 45, "t": "E · Ventilatoren", "q": "Weshalb werden Ventilatoren heute drehzahlgeregelt über einen FU betrieben?", "a": "Bedarf anpassen, Energie sparen (P∝n³)."}, {"n": 46, "t": "E · Ventilatoren", "q": "Wovon hängt der Betriebspunkt eines Ventilators ab?", "a": "Schnittpunkt Ventilator- × Anlagenkennlinie."}, {"n": 47, "t": "E · Ventilatoren", "q": "Welche Folgen hat ein zu hoher Anlagenwiderstand?", "a": "weniger Volumen, mehr Energie/Schall."}, {"n": 48, "t": "E · Ventilatoren", "q": "Wie prüfst du bei der Inbetriebnahme die Drehrichtung des Ventilators?", "a": "Typenschild/Pfeil, Messung."}, {"n": 49, "t": "E · Ventilatoren", "q": "Was hat es mit dem Wirkungsgrad und der ErP-Richtlinie bei Ventilatoren auf sich?", "a": "EU-Mindestwirkungsgrade für Ventilatoren."}, {"n": 50, "t": "F · Wärmerückgewinnung (WRG)", "q": "Welche WRG-Bauarten kennst du?", "a": "Platten (Kreuz/Gegenstrom), Rotor, Kreislaufverbund (KVS)."}, {"n": 51, "t": "F · Wärmerückgewinnung (WRG)", "q": "Wie ist die Temperatur-Rückwärmzahl definiert?", "a": "Φ=(ϑ_Zu−ϑ_AU)/(ϑ_AB−ϑ_AU)."}, {"n": 52, "t": "F · Wärmerückgewinnung (WRG)", "q": "Welche Vor- und Nachteile hat der Rotationswärmetauscher?", "a": "hoher Wirkungsgrad, Feuchteübertrag; aber Leckage/Geruch."}, {"n": 53, "t": "F · Wärmerückgewinnung (WRG)", "q": "Welche Vor- und Nachteile hat der Plattentauscher?", "a": "keine Stoffübertragung, hygienisch; Vereisungsgefahr."}, {"n": 54, "t": "F · Wärmerückgewinnung (WRG)", "q": "Worin liegt der Hauptvorteil des Kreislaufverbundsystems?", "a": "getrennte Luftströme (Hygiene/Brand); tieferer Wirkungsgrad."}, {"n": 55, "t": "F · Wärmerückgewinnung (WRG)", "q": "Wie schützt du eine WRG vor Vereisung?", "a": "Vorwärmung, Bypass, Modulation, Abtauung."}, {"n": 56, "t": "F · Wärmerückgewinnung (WRG)", "q": "Weshalb ist eine Wärmerückgewinnung heute praktisch immer gefordert?", "a": "Ene const KEY='lapquiz_v1';
let prog=JSON.parse(localStorage.getItem(KEY)||'{}');
let shuffleOn=true,list=[],idx=0,revealed=false;
const topics=[...new Set(DATA.map(d=>d.t))];
const tsel=document.getElementById('topic');
topics.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;tsel.appendChild(o)});
tsel.onchange=build;document.getElementById('mode').onchange=build;
function build(){
 const t=tsel.value,m=document.getElementById('mode').value;
 list=DATA.filter(d=>(!t||d.t===t)&&(m==='alle'||(m==='offen'&&!prog[d.n])||(m==='falsch'&&prog[d.n]==='no')));
 if(shuffleOn)list=[...list].sort(()=>Math.random()-.5);
 idx=0;render()}
function stats(){
 const ok=Object.values(prog).filter(v=>v==='ok').length,no=Object.values(prog).filter(v=>v==='no').length;
 document.getElementById('stats').innerHTML=`Gelernt: <b>${ok}</b> ✓ &nbsp;·&nbsp; Nochmal: <b>${no}</b> ✗ &nbsp;·&nbsp; Offen: <b>${184-ok-no}</b> &nbsp;·&nbsp; Auswahl: <b>${list.length}</b>`}
function render(){
 stats();const c=document.getElementById('card');
 if(!list.length||idx>=list.length){c.innerHTML='<div class="done">🎉 Runde fertig!<br>Wechsle Thema/Modus oder starte neu.</div><button class="btn show" onclick="build()">Nochmal</button>';return}
 const d=list[idx];revealed=false;
 c.innerHTML=`<div class="topic">${d.t} · Frage ${d.n}</div><div class="q">${d.q}</div>
 <button class="btn show" id="bShow" onclick="reveal()">Antwort zeigen</button>
 <div class="a" id="ans">${d.a}</div>
 <button class="btn ok" id="bOk" onclick="mark('ok')">✓ Gewusst (1)</button>
 <button class="btn no" id="bNo" onclick="mark('no')">✗ Nochmal (2)</button>`}
function reveal(){revealed=true;document.getElementById('ans').style.display='block';document.getElementById('bShow').style.display='none';document.getElementById('bOk').style.display='inline-block';document.getElementById('bNo').style.display='inline-block'}
function mark(v){prog[list[idx].n]=v;localStorage.setItem(KEY,JSON.stringify(prog));idx++;render()}
document.addEventListener('keydown',e=>{
 if(e.code==='Space'){e.preventDefault();if(!revealed)reveal()}
 if(revealed&&e.key==='1')mark('ok');
 if(revealed&&e.key==='2')mark('no')});
build();
</script></body></html>
